name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Deploy to S3
        run: |
          BUCKET="${{ secrets.S3_BUCKET }}"
          CF_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

          aws s3 sync . "s3://${BUCKET}" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "scripts/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "assets/images/mockup-reference.png" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" \
            --exclude "css/*" \
            --exclude "js/*"

          aws s3 cp index.html "s3://${BUCKET}/index.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"

          aws s3 sync css/ "s3://${BUCKET}/css/" \
            --cache-control "public, max-age=86400" \
            --content-type "text/css"

          aws s3 sync js/ "s3://${BUCKET}/js/" \
            --cache-control "public, max-age=86400" \
            --content-type "application/javascript"

          aws s3 sync assets/ "s3://${BUCKET}/assets/" \
            --cache-control "public, max-age=31536000"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
